name: Tag Figma Make snapshot
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name, e.g. v2"
        required: true

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Tag the Figma Make repo
        env:
          PAT: ${{ secrets.FIGMA_REPO_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://vaibhav-z-56:${PAT}@github.com" > ~/.git-credentials
          git clone https://github.com/vaibhav-z-56/Testfigmaversioniing1.git repo
          cd repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ github.event.inputs.tag }}" -m "snapshot: ${{ github.event.inputs.tag }}"
          git push origin "${{ github.event.inputs.tag }}"
